app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: foggbh/stocky
            tag: latest
          # probes:
          #   liveness:
          #     enabled: true
          #     custom: true
          #     type: HTTP
          #     spec:
          #       periodSeconds: 300
          #       httpGet:
          #         path: /health
          #         port: 3000
          #   startup:
          #     enabled: true
          #     custom: true
          #     spec:
          #       initialDelaySeconds: 5
          #       periodSeconds: 3
          #       failureThreshold: 20
          #       httpGet:
          #         path: /health
          #         port: 3000
      defaultContainerOptionsStrategy: merge
      defaultContainerOptions:
        image:
          pullPolicy: Always
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
          requests:
            cpu: 50m
            memory: 50Mi
      replicas: null
      strategy: RollingUpdate
      rollingUpdate:
        unavailable: 0
        surge: 5

  service:
    main:
      ports:
        http:
          port: 80
          targetPort: 3000
  ingress:
    main:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
      hosts:
      - host: stocksales.dev.wgbh-mla.org
        paths:
        - path: /
          service:
            identifier: main
      tls:
      - secretName: stocksales-tls
        hosts:
        - stocksales.dev.wgbh-mla.org
