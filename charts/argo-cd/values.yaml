argo-cd:
  global:
    addPrometheusAnnotations: true
    domain: cd.dev.wgbh-mla.org
  certificate:
    enabled: true
    issuer:
      kind: ClusterIssuer
      name: letsencrypt-production
      group: cert-manager.io
  dex:
    enabled: false  
  configs:
    cm:
      kustomize.buildOptions: --enable-helm
  server:
    ingress:
      enabled: true
      tls: true
