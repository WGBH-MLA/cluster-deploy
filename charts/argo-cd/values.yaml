argo-cd:
  global:
    addPrometheusAnnotations: true
  dex:
    enabled: false  
  configs:
    cm:
      kustomize.buildOptions: --enable-helm
  server:
    ingress:
      enabled: true
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
      hostname: cd.dev.wgbh-mla.org
      extraTls:
      - hosts:
        - cd.dev.wgbh-mla.org
        secretName: argocd-server-tls-production
